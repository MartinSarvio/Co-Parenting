    <rect x="214" y="214" width="596" height="596" rx="156" stroke="#E2E0D8" stroke-width="2"/>

    <rect x="322" y="318" width="96" height="384" rx="48" fill="#2F2F2F"/>
    <rect x="606" y="318" width="96" height="384" rx="48" fill="#2F2F2F"/>
    <rect x="418" y="474" width="188" height="92" rx="46" fill="#2F2F2F"/>

